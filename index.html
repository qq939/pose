<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOLO Pose 人体关节识别</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00d4ff;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }
    .panel {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .controls {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
    }
    .btn-secondary {
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: white;
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
    }
    .btn-success {
      background: linear-gradient(135deg, #00cc88, #00a86b);
      color: white;
    }
    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 204, 136, 0.4);
    }
    .video-container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .video-wrapper {
      flex: 1;
      min-width: 300px;
      max-width: 580px;
    }
    video, canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
      background: #000;
    }
    .video-wrapper label {
      display: block;
      margin-bottom: 10px;
      color: #aaa;
      text-align: center;
    }
    .upload-area {
      border: 2px dashed #00d4ff;
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 20px;
    }
    .upload-area:hover {
      border-color: #00aaff;
      background: rgba(0, 212, 255, 0.1);
    }
    .upload-area input {
      display: none;
    }
    .status {
      text-align: center;
      padding: 15px;
      background: rgba(0, 204, 136, 0.2);
      border-radius: 8px;
      color: #00cc88;
    }
    .error {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }
    .info {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .info-item {
      flex: 1;
      min-width: 200px;
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .info-item h3 {
      color: #00d4ff;
      margin-bottom: 5px;
    }
    .loader {
      display: none;
      text-align: center;
      padding: 20px;
    }
    .loader::after {
      content: '';
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(0, 212, 255, 0.3);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #fileName {
      margin-top: 10px;
      color: #aaa;
    }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 15px;
      justify-content: center;
      margin-top: 15px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
    }
    .slider-container label {
      color: #00d4ff;
      min-width: 120px;
    }
    .slider-container input[type="range"] {
      flex: 1;
      max-width: 300px;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
    }
    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00d4ff;
      cursor: pointer;
    }
    .confidence-value {
      min-width: 60px;
      text-align: center;
      font-weight: bold;
      color: #00cc88;
    }
    @media (max-width: 640px) {
      body {
        padding: 10px;
      }
      h1 {
        font-size: 24px;
        margin-bottom: 18px;
      }
      .panel {
        padding: 14px;
        border-radius: 10px;
      }
      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      button {
        width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        font-size: 14px;
      }
      .upload-area {
        padding: 24px 14px;
      }
      .video-container,
      .info {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .video-wrapper,
      .info-item {
        min-width: 0;
        max-width: none;
      }
      .slider-container {
        align-items: stretch;
        flex-direction: column;
        gap: 8px;
      }
      .slider-container label {
        min-width: 0;
      }
      .slider-container input[type="range"] {
        max-width: none;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 YOLO Pose 人体关节识别</h1>

    <div class="panel">
      <div class="controls">
        <button class="btn-success" id="startCamera">📹 开启摄像头</button>
        <button class="btn-secondary" id="stopCamera">⏹️ 关闭摄像头</button>
        <button class="btn-primary" id="startDetection">🔍 开始检测</button>
        <button class="btn-secondary" id="stopDetection">⏹️ 停止检测</button>
        <button class="btn-success" id="saveSample">📷 保存样本</button>
        <button class="btn-secondary" id="clearDataset">🗑️ 清空数据集</button>
      </div>
      <div id="datasetStatus" class="status" style="margin-top: 15px;">数据集: 0 样本</div>
    </div>

    <div class="panel">
      <div class="upload-area" id="uploadArea">
        <p>📁 拖拽视频文件到这里 或 点击选择</p>
        <p style="color: #666; font-size: 14px; margin-top: 10px;">支持 MP4, AVI, MOV 格式</p>
        <input type="file" id="videoInput" accept="video/*">
        <div id="fileName"></div>
      </div>
      <div class="controls">
        <button class="btn-primary" id="processVideo">🎬 处理视频</button>
        <a class="btn-success" id="downloadPoseResult" href="#" download style="display: none; text-decoration: none;">下载检测结果</a>
      </div>
    </div>

    <div class="panel">
      <div class="video-container">
        <div class="video-wrapper">
          <label>📺 摄像头 / 视频源</label>
          <video id="sourceVideo" playsinline webkit-playsinline autoplay muted controls></video>
        </div>
        <div class="video-wrapper">
          <label>✨ YOLO Pose 检测结果</label>
          <canvas id="resultCanvas"></canvas>
        </div>
      </div>
      <div id="status" class="status">状态: 就绪</div>
    </div>

    <div class="panel">
      <h3 style="margin-bottom: 15px;">📊 检测信息</h3>
      <div class="info">
        <div class="info-item">
          <h3>检测到的人数</h3>
          <p id="personCount">0</p>
        </div>
        <div class="info-item">
          <h3>关键点数</h3>
          <p id="keypointCount">0</p>
        </div>
        <div class="info-item">
          <h3>FPS</h3>
          <p id="fpsDisplay">0</p>
        </div>
      </div>
      <div class="slider-container">
        <label>置信度阈值:</label>
        <input type="range" id="confidenceSlider" min="0" max="100" value="30">
        <span class="confidence-value" id="confidenceValue">0.30</span>
      </div>
      <div class="slider-container">
        <label>检测FPS:</label>
        <input type="range" id="fpsLimitSlider" min="1" max="30" value="1">
        <span class="confidence-value" id="fpsLimitValue">1 FPS</span>
      </div>
    </div>
  </div>

  <div class="loader" id="loader">处理中...</div>

  <script>
    // DOM Elements
    const sourceVideo = document.getElementById('sourceVideo');
    const resultCanvas = document.getElementById('resultCanvas');
    const ctx = resultCanvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const loader = document.getElementById('loader');
    const videoInput = document.getElementById('videoInput');
    const uploadArea = document.getElementById('uploadArea');
    const fileNameDiv = document.getElementById('fileName');
    const downloadPoseResult = document.getElementById('downloadPoseResult');

    sourceVideo.addEventListener('loadedmetadata', () => {
      if (!isCameraActive) {
        setPoseFrameSize(sourceVideo.videoWidth || 640, sourceVideo.videoHeight || 480);
      }
    });

    // State
    let isDetecting = false;
    let isCameraActive = false;
    let animationFrameId = null;
    let currentStream = null;
    let confidenceThreshold = 0.3;
    let fpsLimit = 1;
    let lastVideoTime = -1;
    let lastFrameData = null;
    let detectionResults = null;
    let processedVideoPath = null;
    let sampleCount = 0;
    let realtimeDetectionInFlight = false;
    let hasBufferedCameraFrame = false;
    let poseFrameWidth = 640;
    let poseFrameHeight = 480;
    let cameraOutputCount = 0;

    // YOLO Pose Keypoints (17 points for COCO format)
    const KEYPOINT_NAMES = [
      'nose', 'left_eye', 'right_eye', 'left_ear', 'right_ear',
      'left_shoulder', 'right_shoulder', 'left_elbow', 'right_elbow',
      'left_wrist', 'right_wrist', 'left_hip', 'right_hip',
      'left_knee', 'right_knee', 'left_ankle', 'right_ankle'
    ];

    function getPoseFromResults(videoTime) {
      if (!detectionResults || !processedVideoPath) return [];
      
      const frameRate = detectionResults.input_fps || 30;
      const currentFrameIdx = Math.floor(videoTime * frameRate);
      
      let bestFrame = null;
      for (const f of detectionResults.frames) {
        if (f.frame <= currentFrameIdx) {
          if (!bestFrame || f.frame > bestFrame.frame) {
            bestFrame = f;
          }
        } else {
          break;
        }
      }
      
      return bestFrame?.persons || [];
    }

    // Skeleton connections
    const SKELETON = [
      [0, 1], [0, 2], [1, 3], [2, 4],  // head
      [5, 6],                          // shoulders
      [5, 7], [7, 9],                  // left arm
      [6, 8], [8, 10],                 // right arm
      [5, 11], [6, 12],                // torso
      [11, 12],                        // hip
      [11, 13], [13, 15],              // left leg
      [12, 14], [14, 16]               // right leg
    ];

    function setPoseFrameSize(width, height) {
      poseFrameWidth = width || 640;
      poseFrameHeight = height || 480;
      const aspectRatio = `${poseFrameWidth} / ${poseFrameHeight}`;
      sourceVideo.style.aspectRatio = aspectRatio;
      resultCanvas.style.aspectRatio = aspectRatio;
    }

    function getDisplayScale() {
      const canvasDisplayWidth = resultCanvas.offsetWidth || poseFrameWidth;
      const canvasDisplayHeight = resultCanvas.offsetHeight || poseFrameHeight;

      if (resultCanvas.width !== canvasDisplayWidth || resultCanvas.height !== canvasDisplayHeight) {
        resultCanvas.width = canvasDisplayWidth;
        resultCanvas.height = canvasDisplayHeight;
      }

      return {
        canvasDisplayWidth,
        canvasDisplayHeight,
        scaleX: canvasDisplayWidth / poseFrameWidth,
        scaleY: canvasDisplayHeight / poseFrameHeight
      };
    }

    setPoseFrameSize(poseFrameWidth, poseFrameHeight);

    function drawCurrentFrame(canvasWidth, canvasHeight) {
      ctx.clearRect(0, 0, canvasWidth, canvasHeight);

      if (outputVideoCanvas && hasBufferedCameraFrame) {
        ctx.drawImage(outputVideoCanvas, 0, 0, canvasWidth, canvasHeight);
      } else if (sourceVideo.readyState > 0 && sourceVideo.videoWidth > 0) {
        ctx.drawImage(sourceVideo, 0, 0, canvasWidth, canvasHeight);
      }
    }

    function drawKeypoints(persons, canvasWidth, canvasHeight, scaleX, scaleY) {
      drawCurrentFrame(canvasWidth, canvasHeight);

      persons.forEach((person, idx) => {
        const hue = (idx * 60) % 360;

        // Draw skeleton (应用缩放)
        SKELETON.forEach(([a, b]) => {
          const kpA = person.keypoints[a];
          const kpB = person.keypoints[b];

          if (kpA.confidence > confidenceThreshold && kpB.confidence > confidenceThreshold) {
            ctx.beginPath();
            ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.lineWidth = 3 * scaleX;
            ctx.moveTo(kpA.x * scaleX, kpA.y * scaleY);
            ctx.lineTo(kpB.x * scaleX, kpB.y * scaleY);
            ctx.stroke();
          }
        });

        // Draw keypoints (应用缩放)
        person.keypoints.forEach((kp, j) => {
          if (kp.confidence > confidenceThreshold) {
            const radius = 8 * scaleX;
            ctx.beginPath();
            ctx.arc(kp.x * scaleX, kp.y * scaleY, radius, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw label
            if (kp.confidence > confidenceThreshold + 0.3) {
              ctx.fillStyle = 'white';
              ctx.font = `${12 * scaleX}px Arial`;
              ctx.fillText(KEYPOINT_NAMES[j], kp.x * scaleX + 10, kp.y * scaleY);
            }
          }
        });
      });
    }

    function renderPoseFrame() {
      const { canvasDisplayWidth, canvasDisplayHeight, scaleX, scaleY } = getDisplayScale();

      if (lastFrameData && lastFrameData.length > 0) {
        drawKeypoints(lastFrameData, canvasDisplayWidth, canvasDisplayHeight, scaleX, scaleY);
        document.getElementById('personCount').textContent = lastFrameData.length;
        document.getElementById('keypointCount').textContent =
          lastFrameData.reduce((sum, p) => sum + p.keypoints.length, 0);
      } else {
        drawCurrentFrame(canvasDisplayWidth, canvasDisplayHeight);
        document.getElementById('personCount').textContent = '0';
        document.getElementById('keypointCount').textContent = '0';
      }

      document.getElementById('fpsDisplay').textContent = sourceVideo.paused ? '0' : `~${fpsLimit}`;
    }

    function processFrame() {
      if (!isDetecting) return;

      const currentTime = sourceVideo.currentTime;

      if (sourceVideo.readyState >= 2 && isCameraActive) {
        // Camera mode output is updated by the FPS-limited sampler.
      } else if (sourceVideo.readyState >= 2 && currentTime !== lastVideoTime) {
        lastVideoTime = currentTime;
        lastFrameData = getPoseFromResults(currentTime);
        renderPoseFrame();
      }

      animationFrameId = requestAnimationFrame(processFrame);
    }

    async function detectFrameRealtime(frameCanvas) {
      if (!isCameraActive || !frameCanvas || realtimeDetectionInFlight) return false;
      realtimeDetectionInFlight = true;
      
      try {
        const canvas = document.createElement('canvas');
        canvas.width = poseFrameWidth;
        canvas.height = poseFrameHeight;
        const tempCtx = canvas.getContext('2d');
        tempCtx.drawImage(frameCanvas, 0, 0, poseFrameWidth, poseFrameHeight);
        const imageData = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
        
        const response = await fetch('/api/detect-frame', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageData, confThreshold: confidenceThreshold })
        });
        
        const result = await response.json();
        if (!response.ok) {
          const setupMessage = result.setup?.message ? ` (${result.setup.message})` : '';
          throw new Error((result.error || '检测服务暂不可用') + setupMessage);
        }
        if (!result.success) {
          throw new Error(result.error || '检测失败');
        }
        if (Array.isArray(result.persons)) {
          outputVideoCtx.drawImage(frameCanvas, 0, 0, poseFrameWidth, poseFrameHeight);
          hasBufferedCameraFrame = true;
          lastFrameData = result.persons;
          renderPoseFrame();
          if (isDetecting) {
            updateStatus('检测中...');
          }
        }
        return true;
      } catch (e) {
        console.error('Frame detection error:', e);
        updateStatus(`检测服务异常: ${e.message}`, true);
        return false;
      } finally {
        realtimeDetectionInFlight = false;
      }
    }

    async function saveDatasetSample() {
      if (!isCameraActive || !lastFrameData || lastFrameData.length === 0) {
        updateStatus('请先开启摄像头并检测到人体', true);
        return;
      }
      
      try {
        const canvas = document.createElement('canvas');
        canvas.width = poseFrameWidth;
        canvas.height = poseFrameHeight;
        const tempCtx = canvas.getContext('2d');
        if (outputVideoCanvas && hasBufferedCameraFrame) {
          tempCtx.drawImage(outputVideoCanvas, 0, 0, poseFrameWidth, poseFrameHeight);
        } else {
          tempCtx.drawImage(sourceVideo, 0, 0, poseFrameWidth, poseFrameHeight);
        }
        const imageData = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
        
        const h = canvas.height;
        const w = canvas.width;
        let labelData = '';
        
        for (const person of lastFrameData) {
          const keypoints = person.keypoints;
          const cx = keypoints.reduce((s, kp) => s + kp.x, 0) / keypoints.length / w;
          const cy = keypoints.reduce((s, kp) => s + kp.y, 0) / keypoints.length / h;
          const width = (Math.max(...keypoints.map(kp => kp.x)) - Math.min(...keypoints.map(kp => kp.x))) / w;
          const height = (Math.max(...keypoints.map(kp => kp.y)) - Math.min(...keypoints.map(kp => kp.y))) / h;
          
          labelData += `0 ${cx.toFixed(6)} ${cy.toFixed(6)} ${width.toFixed(6)} ${height.toFixed(6)}`;
          for (const kp of keypoints) {
            labelData += ` ${(kp.x / w).toFixed(6)} ${(kp.y / h).toFixed(6)} ${kp.confidence.toFixed(3)}`;
          }
          labelData += '\n';
        }
        
        const response = await fetch('/api/save-dataset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageData, labelData, sampleIndex: sampleCount })
        });
        
        const result = await response.json();
        if (result.success) {
          sampleCount++;
          document.getElementById('datasetStatus').textContent = `数据集: ${sampleCount} 样本`;
          updateStatus(`样本 ${sampleCount} 已保存`);
        }
      } catch (e) {
        updateStatus(`保存失败: ${e.message}`, true);
      }
    }

    function clearDataset() {
      sampleCount = 0;
      document.getElementById('datasetStatus').textContent = '数据集: 0 样本';
      updateStatus('数据集已清空');
    }

    function updateStatus(message, isError = false) {
      statusDiv.textContent = `状态: ${message}`;
      statusDiv.className = isError ? 'error' : 'status';
    }

    async function playSourceVideo() {
      try {
        await sourceVideo.play();
      } catch (error) {
        throw new Error(`视频播放失败: ${error.message}`);
      }
    }

    // Event Handlers
    document.getElementById('startCamera').addEventListener('click', async () => {
      try {
        updateStatus('正在开启摄像头...');

        if (!window.isSecureContext) {
          throw new Error('手机摄像头需要 HTTPS，请使用 https://sadsad.fun 访问');
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('浏览器不支持摄像头访问');
        }

        currentStream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 640 },
            height: { ideal: 480 },
            facingMode: 'user'
          },
          audio: false
        });
        isCameraActive = true;
        sourceVideo.srcObject = currentStream;
        sourceVideo.muted = true;
        sourceVideo.setAttribute('playsinline', '');
        sourceVideo.setAttribute('webkit-playsinline', '');
        setPoseFrameSize(640, 480);
        await playSourceVideo();
        
        startLimitedVideoLoop();
        updateStatus('摄像头已开启');
      } catch (err) {
        console.error('Camera error:', err);
        let errorMsg = err.message;
        if (err.name === 'NotAllowedError') {
          errorMsg = '摄像头访问被拒绝';
        } else if (err.name === 'NotFoundError') {
          errorMsg = '未找到摄像头设备';
        } else if (err.name === 'NotReadableError') {
          errorMsg = '摄像头被其他程序占用';
        } else if (err.name === 'OverconstrainedError') {
          errorMsg = '摄像头不支持请求的分辨率';
        }
        updateStatus(`摄像头错误: ${errorMsg}`, true);
      }
    });

    let stagingVideoCanvas = null;
    let stagingVideoCtx = null;
    let outputVideoCanvas = null;
    let outputVideoCtx = null;
    let limitedFrameTimerId = null;
    let captureFrameAnimationId = null;
    let cameraFramePool = [];
    const CAMERA_FRAME_POOL_SIZE = 5;

    function getFrameIntervalMs() {
      return 1000 / Math.max(fpsLimit, 1);
    }

    function startLimitedVideoLoop() {
      stopLimitedVideoLoop();

      stagingVideoCanvas = document.createElement('canvas');
      stagingVideoCanvas.width = poseFrameWidth;
      stagingVideoCanvas.height = poseFrameHeight;
      stagingVideoCtx = stagingVideoCanvas.getContext('2d');
      outputVideoCanvas = document.createElement('canvas');
      outputVideoCanvas.width = poseFrameWidth;
      outputVideoCanvas.height = poseFrameHeight;
      outputVideoCtx = outputVideoCanvas.getContext('2d');
      hasBufferedCameraFrame = false;
      cameraFramePool = [];
      cameraOutputCount = 0;

      const captureCameraFrame = () => {
        if (!isCameraActive) return;

        if (sourceVideo.readyState >= 2) {
          stagingVideoCtx.drawImage(sourceVideo, 0, 0, poseFrameWidth, poseFrameHeight);
          const frameCanvas = document.createElement('canvas');
          frameCanvas.width = poseFrameWidth;
          frameCanvas.height = poseFrameHeight;
          frameCanvas.getContext('2d').drawImage(stagingVideoCanvas, 0, 0, poseFrameWidth, poseFrameHeight);
          cameraFramePool.push(frameCanvas);
          if (cameraFramePool.length > CAMERA_FRAME_POOL_SIZE) {
            cameraFramePool.splice(0, cameraFramePool.length - CAMERA_FRAME_POOL_SIZE);
          }
        }

        captureFrameAnimationId = requestAnimationFrame(captureCameraFrame);
      };

      const outputLatestFrame = () => {
        if (!isCameraActive || !outputVideoCtx || cameraFramePool.length === 0) return;

        const latestFrame = cameraFramePool[cameraFramePool.length - 1];
        cameraFramePool = [];
        outputVideoCtx.drawImage(latestFrame, 0, 0, poseFrameWidth, poseFrameHeight);
        hasBufferedCameraFrame = true;
        cameraOutputCount++;
        window.__poseDebug = {
          ...(window.__poseDebug || {}),
          cameraOutputCount,
          fpsLimit,
          poolSize: cameraFramePool.length,
          lastOutputAt: performance.now()
        };

        if (isDetecting) {
          detectFrameRealtime(latestFrame);
        } else {
          renderPoseFrame();
        }
      };

      captureCameraFrame();
      outputLatestFrame();
      limitedFrameTimerId = window.setInterval(outputLatestFrame, getFrameIntervalMs());
    }

    function stopLimitedVideoLoop() {
      if (limitedFrameTimerId) {
        clearInterval(limitedFrameTimerId);
        limitedFrameTimerId = null;
      }
      if (captureFrameAnimationId) {
        cancelAnimationFrame(captureFrameAnimationId);
        captureFrameAnimationId = null;
      }
      cameraFramePool = [];
    }

    document.getElementById('stopCamera').addEventListener('click', () => {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
      stopLimitedVideoLoop();
      stagingVideoCanvas = null;
      stagingVideoCtx = null;
      outputVideoCanvas = null;
      outputVideoCtx = null;
      cameraOutputCount = 0;
      hasBufferedCameraFrame = false;
      sourceVideo.srcObject = null;
      sourceVideo.src = '';
      isCameraActive = false;
      isDetecting = false;
      realtimeDetectionInFlight = false;
      cancelAnimationFrame(animationFrameId);
      updateStatus('摄像头已关闭');
    });

    document.getElementById('startDetection').addEventListener('click', () => {
      if (!isCameraActive && !sourceVideo.src && !videoInput.files[0]) {
        updateStatus('请先开启摄像头或上传视频', true);
        return;
      }
      isDetecting = true;
      processFrame();
      updateStatus('检测中...');
    });

    document.getElementById('stopDetection').addEventListener('click', () => {
      isDetecting = false;
      cancelAnimationFrame(animationFrameId);
      updateStatus('检测已停止');
    });

    document.getElementById('saveSample').addEventListener('click', saveDatasetSample);
    document.getElementById('clearDataset').addEventListener('click', clearDataset);

    // Upload handling
    uploadArea.addEventListener('click', () => videoInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#00ff00';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#00d4ff';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#00d4ff';
      if (e.dataTransfer.files[0]) {
        videoInput.files = e.dataTransfer.files;
        handleVideoSelect();
      }
    });

    videoInput.addEventListener('change', handleVideoSelect);

    function handleVideoSelect() {
      const file = videoInput.files[0];
      if (file) {
        stopLimitedVideoLoop();
        fileNameDiv.textContent = `已选择: ${file.name}`;
        const url = URL.createObjectURL(file);
        sourceVideo.src = url;
        sourceVideo.muted = false;
        sourceVideo.removeAttribute('autoplay');
        sourceVideo.srcObject = null;
        isCameraActive = false;
        hasBufferedCameraFrame = false;
        lastVideoTime = -1;
        lastFrameData = null;
        detectionResults = null;
        processedVideoPath = null;
        downloadPoseResult.style.display = 'none';
        downloadPoseResult.removeAttribute('href');
        updateStatus(`已加载视频: ${file.name}`);
      }
    }

    document.getElementById('processVideo').addEventListener('click', async () => {
      const file = videoInput.files[0];
      if (!file) {
        updateStatus('请先上传视频', true);
        return;
      }

      loader.style.display = 'block';
      updateStatus('上传视频中...');

      const formData = new FormData();
      formData.append('video', file);

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });
        const uploadResult = await response.json();
        if (!uploadResult.success) {
          throw new Error(uploadResult.error);
        }
        
        updateStatus('正在检测姿态...');
        
        const processResponse = await fetch('/api/process-video', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            videoPath: `/uploads/${uploadResult.filename}`,
            confThreshold: confidenceThreshold,
            skipFrames: 0
          })
        });
        const processResult = await processResponse.json();
        
        if (!processResponse.ok) {
          const setupMessage = processResult.setup?.message ? ` (${processResult.setup.message})` : '';
          throw new Error((processResult.error || '检测服务暂不可用') + setupMessage);
        }
        if (processResult.error) {
          throw new Error(processResult.error);
        }
        
        detectionResults = processResult;
        processedVideoPath = `/uploads/${uploadResult.filename}`;
        setPoseFrameSize(processResult.frame_width || sourceVideo.videoWidth || 640, processResult.frame_height || sourceVideo.videoHeight || 480);
        if (processResult.resultPath) {
          downloadPoseResult.href = processResult.resultPath;
          downloadPoseResult.download = processResult.resultFilename || 'pose-result.json';
          downloadPoseResult.style.display = 'inline-block';
        }
        updateStatus(`检测完成: ${processResult.total_output_frames}/${processResult.total_input_frames} 帧 (${processResult.sampling_rate})`);
      } catch (err) {
        downloadPoseResult.style.display = 'none';
        downloadPoseResult.removeAttribute('href');
        updateStatus(`处理失败: ${err.message}`, true);
      }

      loader.style.display = 'none';
    });

    document.getElementById('confidenceSlider').addEventListener('input', (e) => {
      confidenceThreshold = e.target.value / 100;
      document.getElementById('confidenceValue').textContent = confidenceThreshold.toFixed(2);
    });

    document.getElementById('fpsLimitSlider').addEventListener('input', (e) => {
      fpsLimit = parseInt(e.target.value);
      document.getElementById('fpsLimitValue').textContent = `${fpsLimit} FPS`;
      if (isCameraActive) {
        startLimitedVideoLoop();
      }
    });
  </script>
</body>
</html>
